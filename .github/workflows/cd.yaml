name: CD

on:
  workflow_dispatch:

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          docker build \
            -t ghcr.io/nadmax/play:${{ github.sha }} \
            -f Dockerfile \
            .
          docker push ghcr.io/nadmax/play:${{ github.sha }}

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      security-events: write
      packages: read
    steps:
      - name: Install Trivy
        uses: aquasecurity/setup-trivy@v0.2.0
        with:
          cache: true
          version: v0.69.3

      - name: Scan Docker Image (SARIF)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ghcr.io/nadmax/play:${{ github.sha }}
          format: sarif
          output: trivy-scan-results.sarif
          skip-setup-trivy: true

      - name: Scan Docker Image (Security Gate)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ghcr.io/nadmax/play:${{ github.sha }}
          severity: HIGH,CRITICAL
          format: table
          exit-code: "1"
          skip-setup-trivy: true

      - name: Upload scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-scan-results.sarif"

  push:
    name: Push to GHCR
    runs-on: ubuntu-latest
    needs: security
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Generate image metadata
        id: meta
        run: |
          git fetch --tags
          GIT_TAG=$(git describe --tags --abbrev=0 2>/dev/null)
          if [ -z "$GIT_TAG" ]; then
            echo "No tag found, skipping versioned push"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "tag=${GIT_TAG#v}" >> $GITHUB_OUTPUT
          fi

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Retag and push Docker image
        if: steps.meta.outputs.skip != 'true'
        run: |
          docker buildx imagetools create \
            --tag ghcr.io/nadmax/play:${{ steps.meta.outputs.tag }} \
            --tag ghcr.io/nadmax/play:latest \
            ghcr.io/nadmax/play:${{ github.sha }}
