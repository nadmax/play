# Alembic configuration file.
# The database URL is intentionally left blank here; it is read
# from the DATABASE_URL environment variable inside alembic/env.py.

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
path_separator = os

# file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s
# truncate_slug_length = 40
# timezone =
# revision_environment = false
# sourceless = false
# recursive_version_locations = false
# output_encoding = utf-8

# Hook: auto-fix migrations with ruff after generation.
[post_write_hooks]
hooks = ruff
ruff.type = exec
ruff.executable = ruff
ruff.options = check --fix REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
